<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지금 날씨 어때? — 우리 동네 실제 날씨</title>
  <meta name="description" content="국내 동네·명소 단위로 실제 지금 날씨를 바로 확인하는 서비스" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="logo">☀️ 지금 날씨 어때?</div>
    </nav>

    <div class="hero-content">
      <h1>우리 동네,<br />지금 진짜 날씨는 어떨까?</h1>
      <p class="subtitle">숫자 예보 + 실시간 라이브 영상으로 국내 동네·명소 날씨를 바로 확인하세요.</p>
    </div>
  </header>

  <main>
    <section class="search-section">
      <form class="search-form" id="search-form">
        <div class="search-input-wrap">
          <input
            type="text"
            id="city-input"
            placeholder="동네 또는 명소를 입력하세요 (예: 성수동, 해운대, 광화문광장)"
            autocomplete="off"
            required
          />
          <div id="autocomplete-list" class="autocomplete-list hidden"></div>
        </div>
        <button type="submit" class="btn-primary">날씨 확인</button>
      </form>
      <p class="search-hint">시/도(서울, 부산)는 물론 성수동, 해운대, 광화문광장 같은 동네·명소 단위로도 검색할 수 있어요. 자동완성에는 없어도 검색해보세요.</p>
      <div id="search-result" class="result" aria-live="polite"></div>
    </section>

    <section class="mylocation-section">
      <h2>📍 내 위치</h2>
      <div id="panel-mylocation">
        <div class="panel-loading">위치를 확인하는 중...</div>
      </div>
    </section>

    <section class="favorites-section">
      <h2>⭐ 즐겨찾기</h2>
      <div id="favorites-list"></div>
    </section>
  </main>

  <footer class="footer">
    <p>지금 날씨 어때? · 국내 동네·명소 단위로 실제 지금 날씨 확인하는 서비스</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
